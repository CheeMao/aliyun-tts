name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dashscope pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --windowed --name "AI-TTS" tts_gui.py

      - name: Rename for platform
        run: |
          mv dist/AI-TTS.exe dist/AI-TTS-Windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows
          path: dist/AI-TTS-Windows.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dashscope pyinstaller

      - name: Build app bundle
        run: |
          pyinstaller --windowed --name "AI-TTS" tts_gui.py

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "AI-TTS" \
            --volicon "dist/AI-TTS.app/Contents/Resources/icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "AI-TTS.app" 150 190 \
            --hide-extension "AI-TTS.app" \
            --app-drop-link 450 190 \
            "dist/AI-TTS-macOS.dmg" \
            "dist/AI-TTS.app" || true

      - name: Fallback to zip if dmg fails
        run: |
          if [ ! -f dist/AI-TTS-macOS.dmg ]; then
            cd dist
            zip -r AI-TTS-macOS.zip AI-TTS.app
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS
          path: |
            dist/AI-TTS-macOS.dmg
            dist/AI-TTS-macOS.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xvfb

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dashscope pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --name "AI-TTS" tts_gui.py

      - name: Rename for platform
        run: |
          mv dist/AI-TTS dist/AI-TTS-Linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux
          path: dist/AI-TTS-Linux

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Windows
          path: release/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macOS
          path: release/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: Linux
          path: release/

      - name: List release files
        run: ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: true
          body: |
            ## 下载说明

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows | AI-TTS-Windows.exe | 双击运行 |
            | macOS | AI-TTS-macOS.dmg | 挂载后拖到 Applications |
            | Linux | AI-TTS-Linux | 添加执行权限后运行 |